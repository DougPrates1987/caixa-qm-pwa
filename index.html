
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Controle de Caixa QM</title>

  <meta name="theme-color" content="#003b73">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Caixa QM">

  <style>
    :root{
      --blue:#003b73;
      --green:#027a48;
      --red:#b42318;
      --bg:#f4f7fb;
      --card:#ffffff;
      --border:#d0d5dd;
      --text:#101828;
      --radius:3px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      background:var(--blue);
      color:#fff;
      padding:18px;
      font-size:20px;
      font-weight:700;
    }

    .container{
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:16px;
      margin-bottom:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:20px;
    }

    .card h3{
      margin-bottom:12px;
      color:var(--blue);
    }

    .kpi{
      font-size:28px;
      font-weight:700;
    }

    .green{
      color:var(--green);
    }

    .red{
      color:var(--red);
    }

    .table-wrap{
      overflow:auto;
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#eef4ff;
      color:var(--blue);
      padding:12px;
      text-align:left;
      font-size:13px;
    }

    td{
      padding:12px;
      border-top:1px solid #eaecf0;
      font-size:13px;
    }

    .status{
      margin-top:15px;
      font-size:13px;
      color:#667085;
    }
  </style>
</head>
<body>

  <div class="topbar">
    Controle de Caixa QM
  </div>

  <div class="container">

    <div class="grid">

      <div class="card">
        <h3>Total Receitas</h3>
        <div class="kpi green" id="totalReceitas">
          MT 0,00
        </div>
      </div>

      <div class="card">
        <h3>Total Despesas</h3>
        <div class="kpi red" id="totalDespesas">
          MT 0,00
        </div>
      </div>

      <div class="card">
        <h3>Saldo</h3>
        <div class="kpi" id="saldoTotal">
          MT 0,00
        </div>
      </div>

    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Tipo</th>
            <th>Categoria</th>
            <th>Descrição</th>
            <th>Valor</th>
          </tr>
        </thead>

        <tbody id="historicoBody">
          <tr>
            <td colspan="5">
              Carregando dados...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="status">
      PWA Cloudflare ativo.
    </div>

  </div>

  <script>

    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXJ_7GTRb3bzjbWV21AdA8tKpt7DXaViCBVZSsrlW85gbMKJHDX_v3RPRCLZXHZJnF/exec';

    async function carregarDashboard(){

      try{

        const resposta = await fetch(APPS_SCRIPT_URL + '?action=dashboard');

        const dados = await resposta.json();

        document.getElementById('totalReceitas').innerText = formatMoney(dados.totalReceitas || 0);
        document.getElementById('totalDespesas').innerText = formatMoney(dados.totalDespesas || 0);
        document.getElementById('saldoTotal').innerText = formatMoney(dados.saldo || 0);

      }catch(erro){

        console.log(erro);

      }

    }

    function formatMoney(valor){

      return new Intl.NumberFormat('pt-MZ', {
        style:'currency',
        currency:'MZN'
      }).format(Number(valor || 0));

    }

    carregarDashboard();

    if('serviceWorker' in navigator){

      window.addEventListener('load', function(){

        navigator.serviceWorker.register('./service-worker.js')
          .then(function(){
            console.log('Service Worker registrado');
          })
          .catch(function(err){
            console.log(err);
          });

      });

    }

  </script>

</body>
</html>
